name: Deploy Frontend to AWS S3 & CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Production Bundle
        run: npm run build

      - name: Verify Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: Output directory 'dist' was not generated."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Static Assets to S3
        run: |
          # Sync hashed assets folder with long-term immutable caching
          aws s3 sync dist/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ --delete --cache-control "public, max-age=31536000, immutable"
          
          # Sync other files (like index.html, favicon, images) with immediate validation (no-cache)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ --exclude "assets/*" --delete --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
